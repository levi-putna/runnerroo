<html>
  <body style="font-family: system-ui, sans-serif; line-height: 1.6; padding: 24px; max-width: 480px">
    <!-- Sign-in / passwordless OTP -->
    <h2 style="margin-top: 0">Your sign-in code</h2>
    <p>Hello,</p>
    <p>Use this one-time code to finish signing in to Runneroo:</p>
    <p style="font-size: 28px; font-weight: 700; letter-spacing: 0.2em; margin: 24px 0">{{ .Token }}</p>
    <p style="color: #555; font-size: 13px">
      Alternatively, you can
      <a href="{{ .ConfirmationURL }}">open this link</a>
      instead of typing the code. This code expires soon.
    </p>
    <p style="color: #777; font-size: 12px; margin-top: 32px">If you didn&apos;t request this, you can safely ignore this email.</p>
  </body>
</html>
