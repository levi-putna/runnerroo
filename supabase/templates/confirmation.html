<html>
  <body style="font-family: system-ui, sans-serif; line-height: 1.6; padding: 24px; max-width: 480px">
    <!-- Sign-up email confirmation OTP -->
    <h2 style="margin-top: 0">Confirm your email</h2>
    <p>Hello,</p>
    <p>Enter this verification code to confirm your Runneroo account and finish signing up:</p>
    <p style="font-size: 28px; font-weight: 700; letter-spacing: 0.2em; margin: 24px 0">{{ .Token }}</p>
    <p style="color: #555; font-size: 13px">
      Or
      <a href="{{ .ConfirmationURL }}">confirm via this link</a>
      .
    </p>
    <p style="color: #777; font-size: 12px; margin-top: 32px">If you didn&apos;t create an account, you can safely ignore this email.</p>
  </body>
</html>
